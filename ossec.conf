<ossec_config>

  <command>
    <name>netsh-drop</name>
    <executable>netsh-drop.exe</executable>
    <expect>srcip</expect>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <command>
    <name>isolate-host</name>
    <executable>isolate-host.exe</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>
  
  <command>
	<name>shutdown-host</name>
	<executable>shutdown-host.cmd</executable>
	<timeout_allowed>no</timeout_allowed>
  </command>
  
  <command>
	<name>kill-process</name>
	<executable>kill-process.cmd</executable>
	<timeout_allowed>no</timeout_allowed>
  </command>

  <active-response>
    <disabled>no</disabled>
    <command>netsh-drop</command>
    <location>local</location>
    <rules_id>100856</rules_id>
    <timeout>15</timeout>
  </active-response>

  <active-response>
    <disabled>no</disabled>
    <command>isolate-host</command>
    <location>local</location>
    <rules_id>100900,100901,100902,100903,100904,100750,100751</rules_id>
    <timeout>60</timeout>
  </active-response>
  
  <active-response>
	<disabled>no</disabled>
	<command>shutdown-host</command>
	<location>local</location>
	<rules_id>100904</rules_id>
  </active-response>
  
  <active-response>
	<disabled>no</disabled>
	<command>kill-process</command>
	<location>local</location>
	<rules_id>100750,100751,100904</rules_id>
  </active-response>

</ossec_config>
